# Appended after the system alsa.conf into a combined config (see
# run_bedrock.sh, exported as ALSA_CONFIG_PATH) on CFWs where PipeWire holds
# the ALSA hardware exclusively but exposes no PulseAudio socket (muOS
# Jacaranda). Only the game sees this config.
#
# The shipped SDL3 has no pipewire audio driver compiled in, so game audio
# goes SDL3 -> ALSA. SDL3 only opens "default" when the ALSA namehint list
# contains it; muOS's minimal config hints only sysdefault:CARD=..., so SDL3
# opens those — and raw card access fails with EBUSY while PipeWire runs.
# Route both default and sysdefault through the pipewire ALSA plugin (the
# plugin finds the socket via PIPEWIRE_RUNTIME_DIR, exported by
# run_bedrock.sh).
pcm.!default {
    type plug
    slave.pcm {
        type pipewire
    }
    hint {
        show on
        description "Default (PipeWire)"
    }
}
ctl.!default {
    type pipewire
}
pcm.!sysdefault {
    @args [ CARD ]
    @args.CARD {
        type string
        default "audiocodec"
    }
    type plug
    slave.pcm {
        type pipewire
    }
    hint {
        show on
        description "Default Audio Device (PipeWire)"
    }
}
